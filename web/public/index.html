<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Analyzer</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div class="container">
        <header class="hero">
            <div class="hero-copy">
                <p class="eyebrow">Smart Resume Review</p>
                <h1>AI Resume Analyzer</h1>
                <p class="hero-text">Upload your resume, choose the job type, and receive clear feedback for job fit, strengths, weaknesses, and improvement suggestions.</p>
            </div>
            <div class="hero-actions">
                <label for="langSelect">Language / ภาษา</label>
                <select id="langSelect">
                    <option value="en">English</option>
                    <option value="th">ไทย</option>
                </select>
            </div>
        </header>

        <section class="form-card">
            <div class="form-grid">
                <div class="form-group">
                    <label for="resume">Resume PDF</label>
                    <input type="file" id="resume" accept=".pdf">
                </div>
                <div class="form-group">
                    <label for="jobTitle">Job Title</label>
                    <input type="text" id="jobTitle" placeholder="AI Engineer">
                </div>
                <div class="form-group">
                    <label for="jobType">Job Type</label>
                    <select id="jobType">
                        <option value="">Select job type (optional)</option>
                        <option value="software_engineer">Software Engineer</option>
                        <option value="data_scientist">Data Scientist</option>
                        <option value="ml_engineer">ML Engineer</option>
                        <option value="ai_research">AI Research</option>
                        <option value="internship">Internship</option>
                    </select>
                </div>
                <div class="form-group form-checkbox">
                    <input type="checkbox" id="isNewGrad">
                    <label for="isNewGrad">I am a new graduate</label>
                </div>
            </div>
            <button id="analyzeBtn" type="button">Analyze Resume</button>
        </section>

        <section id="result" class="result"></section>
    </div>

    <script src="/js/script.js"></script>
</body>

</html>
