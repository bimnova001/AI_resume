<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Jobs - Resume AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root {
            --primary:        #4338ca;
            --primary-hover:  #3730a3;
            --primary-light:  #eef2ff;
            --primary-mid:    #6366f1;
            --accent:         #6366f1;
            --text-primary:   #0f172a;
            --text-secondary: #475569;
            --text-muted:     #94a3b8;
            --surface:        #ffffff;
            --bg:             #f8faff;
            --bg-hero:        linear-gradient(160deg,#eef2ff 0%,#f0f4ff 40%,#ffffff 100%);
            --border:         #e2e8f0;
            --border-strong:  #c7d2fe;
            --shadow-sm:      0 1px 3px rgba(15,23,42,.06), 0 1px 2px rgba(15,23,42,.04);
            --shadow-md:      0 4px 16px rgba(67,56,202,.10), 0 2px 6px rgba(15,23,42,.05);
            --shadow-lg:      0 12px 32px rgba(67,56,202,.14), 0 4px 12px rgba(15,23,42,.06);
            --radius-sm:      8px;
            --radius-md:      12px;
            --radius-lg:      20px;
            --radius-xl:      28px;
            --font:           'Plus Jakarta Sans', system-ui, sans-serif;
            --transition:     200ms cubic-bezier(.4,0,.2,1);
        }
 
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; scroll-behavior: smooth; }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text-primary);
        }

        nav {
            background: linear-gradient(135deg, #4338ca 0%, #6366f1 100%);
            color: #ffffff;
            padding: 0;
            box-shadow: 0 4px 12px rgba(67, 56, 202, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-container {
            width: min(1200px, calc(100% - 32px));
            margin: 0 auto;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 40px;
        }

        .navbar-logo a {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #ffffff;
            font-weight: 800;
            font-size: 1.3rem;
        }

        .navbar-menu {
            display: flex;
            gap: 32px;
            list-style: none;
            margin: 0;
            padding: 0;
            flex: 1;
        }

        .nav-link {
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 12px;
            border-radius: 8px;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .navbar-user {
            position: relative;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            border: 2px solid rgba(255, 255, 255, 0.3);
            font-weight: 700;
            cursor: pointer;
        }

        .user-menu {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            min-width: 200px;
            overflow: hidden;
            z-index: 1000;
        }

        .user-menu.hidden {
            display: none;
        }

        .user-menu-header {
            padding: 16px;
            border-bottom: 1px solid #e2e8f0;
            color: #111827;
            font-weight: 700;
        }

        .user-menu-item {
            display: block;
            width: 100%;
            padding: 12px 16px;
            border: none;
            background: none;
            color: #334155;
            text-decoration: none;
            cursor: pointer;
            text-align: left;
            transition: background 0.2s;
        }

        .user-menu-item:hover {
            background: #f1f5f9;
        }

        .user-menu-item.logout {
            color: #dc2626;
        }

        .container {
            width: min(1000px, calc(100% - 32px));
            margin: 48px auto;
        }

        .page-header {
            margin-bottom: 40px;
        }

        .page-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 12px;
        }

        .page-subtitle {
            color: #475569;
            font-size: 1rem;
        }

        .empty-state {
            text-align: center;
            padding: 80px 40px;
            background: #ffffff;
            border-radius: 20px;
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }

        .empty-title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .empty-text {
            color: #475569;
            margin-bottom: 24px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4338ca 0%, #6366f1 100%);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 12px 24px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(67, 56, 202, 0.3);
        }

        @media (max-width: 768px) {
            .navbar-menu {
                gap: 16px;
            }

            .page-title {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <div id="navbar-placeholder"></div>
    <script src="/js/navbar.js"></script>

    <div class="container" data-aos="fade-up" data-aos-duration="800">
        <div class="page-header">
            <h1 class="page-title">Saved Jobs</h1>
            <p class="page-subtitle">Jobs you've bookmarked for later review</p>
        </div>

        <div class="empty-state" data-aos="zoom-in-up" data-aos-duration="800">
            <div class="empty-icon" ></div>
            <div class="empty-title">No Saved Jobs Yet</div>
            <p class="empty-text">Start exploring job listings and save positions that interest you.</p>
            <a href="/pages/job-listings.html" class="btn-primary">Browse Jobs</a>
        </div>
    </div>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
        // User menu
        document.getElementById('userBtn').addEventListener('click', function() {
            const menu = document.getElementById('userMenu');
            menu.classList.toggle('hidden');
        });

        document.addEventListener('click', function(event) {
            const userMenu = document.getElementById('userMenu');
            const userBtn = document.getElementById('userBtn');
            if (!event.target.closest('.navbar-user')) {
                userMenu.classList.add('hidden');
            }
        });

        function loadUserInfo() {
            const user = JSON.parse(localStorage.getItem('user') || '{"name":"Guest","initials":"G"}');
            document.getElementById('userName').textContent = user.name;
            document.getElementById('userInitial').textContent = user.initials || user.name.charAt(0).toUpperCase();
        }

        loadUserInfo();
    </script>
</body>
</html>
